<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSonali — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF6EC;
    --cream-2:#F3EBDA;
    --card:#FFFFFF;
    --ink:#2B2419;
    --ink-soft:#6B5F4C;
    --gold:#C9982F;
    --gold-deep:#A87A1E;
    --gold-light:#F1DFAF;
    --line:#E7DCC2;
    --green:#3F7A4E;
    --green-bg:#E7F3E9;
    --amber:#B4791C;
    --amber-bg:#FBEED9;
    --red:#B04A3C;
    --shadow: 0 10px 30px rgba(60,45,10,0.08);
    --radius: 16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'DM Sans', sans-serif;
    background:
      radial-gradient(circle at 10% 0%, var(--gold-light) 0%, transparent 45%),
      var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  h1,h2,h3{ font-family:'Playfair Display', serif; }
  ::selection{ background:var(--gold-light); }

  /* ---------- LOGIN ---------- */
  #loginScreen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .login-card{
    width:100%;
    max-width:380px;
    background:var(--card);
    border-radius: 20px;
    padding:40px 32px;
    box-shadow:var(--shadow);
    border:1px solid var(--line);
    text-align:center;
  }
  .login-mark{
    width:56px; height:56px;
    border-radius:50%;
    margin:0 auto 18px;
    background:linear-gradient(135deg, var(--gold), var(--gold-deep));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Playfair Display',serif; font-weight:700; font-size:22px;
    box-shadow:0 8px 20px rgba(169,122,20,0.35);
  }
  .login-card h1{ font-size:24px; color:var(--ink); margin-bottom:6px;}
  .login-card p{ color:var(--ink-soft); font-size:14px; margin-bottom:26px;}
  #loginKey{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:var(--cream);
    font-size:15px;
    font-family:'DM Sans',sans-serif;
    color:var(--ink);
    outline:none;
    transition:.2s border-color;
  }
  #loginKey:focus{ border-color:var(--gold); }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; cursor:pointer;
    font-family:'DM Sans', sans-serif; font-weight:700; font-size:15px;
    border-radius:12px;
    padding:14px 20px;
    transition:.18s transform ease, .18s box-shadow ease, .18s opacity ease;
  }
  .btn:active{ transform:scale(.98); }
  .btn-gold{
    background:linear-gradient(135deg, var(--gold), var(--gold-deep));
    color:#fff;
    box-shadow:0 10px 22px rgba(169,122,20,0.30);
    width:100%;
    margin-top:14px;
  }
  .btn-gold:hover{ box-shadow:0 12px 26px rgba(169,122,20,0.4); }
  #loginError{
    color:var(--red); font-size:13px; margin-top:12px; min-height:16px;
  }

  /* ---------- APP SHELL ---------- */
  #app{ display:none; }
  header.topbar{
    background:var(--card);
    border-bottom:1px solid var(--line);
    padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap;
    position:sticky; top:0; z-index:20;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg, var(--gold), var(--gold-deep));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Playfair Display',serif; font-weight:700;
  }
  .brand-text h1{ font-size:18px; line-height:1.1; }
  .brand-text span{ font-size:12px; color:var(--ink-soft); }
  #lastSynced{ font-size:12px; color:var(--ink-soft); }

  .sync-row{ display:flex; align-items:center; gap:14px; }
  #syncBtn{
    background:linear-gradient(135deg, var(--gold), var(--gold-deep));
    color:#fff; box-shadow:0 8px 18px rgba(169,122,20,0.28);
    padding:12px 22px;
  }
  #syncBtn.loading{ opacity:.7; pointer-events:none; }
  #syncBtn .dot{
    width:8px; height:8px; border-radius:50%; background:#fff;
    display:inline-block;
  }
  #logoutBtn{
    background:transparent; color:var(--ink-soft);
    border:1.5px solid var(--line); padding:10px 16px;
  }
  #syncToast{
    position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-140%);
    background:var(--ink); color:#FBF6EC; padding:12px 22px; border-radius:12px;
    font-size:14px; font-weight:600; box-shadow:var(--shadow);
    transition:.3s transform ease; z-index:100;
  }
  #syncToast.show{ transform:translateX(-50%) translateY(0); }

  main{ max-width:1080px; margin:0 auto; padding:24px; }

  /* ---------- STAT CARDS ---------- */
  .stats{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:16px;
    margin-bottom:28px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px;
    box-shadow:var(--shadow);
  }
  .stat-card .label{ font-size:12.5px; color:var(--ink-soft); font-weight:600; letter-spacing:.02em; text-transform:uppercase;}
  .stat-card .value{ font-family:'Playfair Display', serif; font-size:30px; margin-top:8px; color:var(--ink);}
  .stat-card.gold .value{ color:var(--gold-deep); }
  .stat-card.green .value{ color:var(--green); }
  .stat-card.amber .value{ color:var(--amber); }

  /* ---------- TABS ---------- */
  .tabs{
    display:flex; gap:8px; margin-bottom:20px;
    border-bottom:1.5px solid var(--line);
    overflow-x:auto;
  }
  .tab-btn{
    background:none; border:none; cursor:pointer;
    font-family:'DM Sans',sans-serif; font-weight:600; font-size:14.5px;
    color:var(--ink-soft);
    padding:12px 6px; margin-right:22px;
    border-bottom:2.5px solid transparent;
    white-space:nowrap;
  }
  .tab-btn.active{ color:var(--gold-deep); border-color:var(--gold); }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  .panel-toolbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; gap:12px; flex-wrap:wrap;
  }
  .search-input{
    padding:10px 14px; border-radius:10px; border:1.5px solid var(--line);
    background:var(--card); font-family:'DM Sans',sans-serif; font-size:14px;
    min-width:220px; outline:none;
  }
  .search-input:focus{ border-color:var(--gold); }
  .filter-pills{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill{
    padding:7px 14px; border-radius:999px; font-size:13px; font-weight:600;
    border:1.5px solid var(--line); background:var(--card); color:var(--ink-soft);
    cursor:pointer;
  }
  .pill.active{ background:var(--gold-light); border-color:var(--gold); color:var(--gold-deep); }

  /* ---------- CARDS LIST ---------- */
  .card-list{ display:flex; flex-direction:column; gap:12px; }
  .item-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; box-shadow:var(--shadow);
    display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .item-main{ flex:1; min-width:220px; }
  .item-main h3{ font-size:16.5px; color:var(--ink); margin-bottom:4px; }
  .item-meta{ font-size:13.5px; color:var(--ink-soft); line-height:1.6; }
  .item-meta b{ color:var(--ink); font-weight:600; }
  .item-side{ display:flex; flex-direction:column; align-items:flex-end; gap:10px; justify-content:space-between; }
  .price-tag{ font-family:'Playfair Display', serif; font-size:19px; color:var(--ink); }
  .status-tag{
    padding:6px 12px; border-radius:999px; font-size:12.5px; font-weight:700;
  }
  .status-tag.paid{ background:var(--green-bg); color:var(--green); }
  .status-tag.awaiting{ background:var(--amber-bg); color:var(--amber); }
  .mini-btn{
    background:none; border:1.5px solid var(--line); color:var(--ink-soft);
    padding:7px 12px; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .mini-btn:hover{ border-color:var(--gold); color:var(--gold-deep); }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
  }
  .empty-state h3{ color:var(--ink); font-size:18px; margin-bottom:6px; }

  footer.foot{
    text-align:center; padding:30px; color:var(--ink-soft); font-size:12.5px;
  }

  @media (max-width:720px){
    .stats{ grid-template-columns:repeat(2, 1fr); }
    header.topbar{ padding:14px 16px; }
    main{ padding:16px; }
    .item-card{ flex-direction:column; }
    .item-side{ align-items:flex-start; flex-direction:row; width:100%; justify-content:space-between; }
  }
</style>
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-mark">iS</div>
      <h1>iSonali Dashboard</h1>
      <p>Enter your access key to continue</p>
      <input type="password" id="loginKey" placeholder="Access key" autocomplete="off">
      <button class="btn btn-gold" id="loginBtn">Unlock Dashboard</button>
      <div id="loginError"></div>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">iS</div>
        <div class="brand-text">
          <h1>iSonali Dashboard</h1>
          <span id="lastSynced">Not synced yet</span>
        </div>
      </div>
      <div class="sync-row">
        <button class="btn btn-gold" id="syncBtn"><span class="dot"></span> Check for New Payments</button>
        <button class="btn" id="logoutBtn">Log out</button>
      </div>
    </header>

    <div id="syncToast"></div>

    <main>
      <section class="stats">
        <div class="stat-card">
          <div class="label">Total Bookings</div>
          <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card green">
          <div class="label">Paid</div>
          <div class="value" id="statPaid">0</div>
        </div>
        <div class="stat-card amber">
          <div class="label">Awaiting Payment</div>
          <div class="value" id="statAwaiting">0</div>
        </div>
        <div class="stat-card gold">
          <div class="label">Revenue Collected</div>
          <div class="value" id="statRevenue">₹0</div>
        </div>
      </section>

      <nav class="tabs">
        <button class="tab-btn active" data-tab="bookings">Bookings</button>
        <button class="tab-btn" data-tab="payments">Payments</button>
        <button class="tab-btn" data-tab="contacts">Contacts</button>
        <button class="tab-btn" data-tab="content">Content Ideas</button>
      </nav>

      <!-- BOOKINGS -->
      <section class="tab-panel active" id="tab-bookings">
        <div class="panel-toolbar">
          <input class="search-input" id="bookingsSearch" placeholder="Search by name, phone, or program...">
          <div class="filter-pills" id="bookingsFilter">
            <button class="pill active" data-filter="all">All</button>
            <button class="pill" data-filter="paid">Paid</button>
            <button class="pill" data-filter="awaiting">Awaiting</button>
          </div>
        </div>
        <div class="card-list" id="bookingsList"></div>
      </section>

      <!-- PAYMENTS -->
      <section class="tab-panel" id="tab-payments">
        <div class="panel-toolbar">
          <input class="search-input" id="paymentsSearch" placeholder="Search by email, phone, or payment ID...">
        </div>
        <div class="card-list" id="paymentsList"></div>
      </section>

      <!-- CONTACTS (CRM) -->
      <section class="tab-panel" id="tab-contacts">
        <div class="panel-toolbar">
          <input class="search-input" id="contactsSearch" placeholder="Search contacts...">
        </div>
        <div class="card-list" id="contactsList"></div>
      </section>

      <!-- CONTENT IDEAS (InstaPlanner) -->
      <section class="tab-panel" id="tab-content">
        <div class="panel-toolbar">
          <input class="search-input" id="contentSearch" placeholder="Search ideas...">
        </div>
        <div class="card-list" id="contentList"></div>
      </section>
    </main>

    <footer class="foot">iSonali.com · Internal dashboard</footer>
  </div>

<script>
/* =========================================================
   CONFIG — paste your Apps Script /exec URL below
   ========================================================= */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynFJ4Bei8sg7a30WlFmqLE8M536R1pOgNNeIxyFIJGmTlzEFozopNIuPWzdYgQ0oLNMQ/exec
";

const DATA = { registrations: [], crm: [], planner: [], metrics: [], payments: [] };
let ACCESS_KEY = localStorage.getItem('isonali_dash_key') || '';

/* ---------------- LOGIN ---------------- */
const loginScreen = document.getElementById('loginScreen');
const appEl = document.getElementById('app');
const loginError = document.getElementById('loginError');

async function tryLogin(key){
  loginError.textContent = '';
  if(!key){ loginError.textContent = 'Enter your access key.'; return; }
  try{
    const res = await fetch(`${SCRIPT_URL}?action=login&key=${encodeURIComponent(key)}`);
    const json = await res.json();
    if(json.ok){
      ACCESS_KEY = key;
      localStorage.setItem('isonali_dash_key', key);
      showApp();
    } else {
      loginError.textContent = 'That key was not recognized. Try again.';
    }
  } catch(err){
    loginError.textContent = 'Could not reach the dashboard. Check your connection.';
  }
}

document.getElementById('loginBtn').addEventListener('click', ()=> tryLogin(document.getElementById('loginKey').value.trim()));
document.getElementById('loginKey').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(e.target.value.trim()); });
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  localStorage.removeItem('isonali_dash_key');
  ACCESS_KEY = '';
  appEl.style.display = 'none';
  loginScreen.style.display = 'flex';
});

function showApp(){
  loginScreen.style.display = 'none';
  appEl.style.display = 'block';
  loadData();
}

/* ---------------- DATA LOADING ---------------- */
async function loadData(){
  try{
    const res = await fetch(`${SCRIPT_URL}?action=data&key=${encodeURIComponent(ACCESS_KEY)}`);
    const json = await res.json();
    if(!json.ok){ toast('Session expired — please log in again.'); return; }
    DATA.registrations = json.registrations || [];
    DATA.crm = json.crm || [];
    DATA.planner = json.planner || [];
    DATA.metrics = json.metrics || [];
    DATA.payments = json.payments || [];
    renderStats(); renderBookings(); renderPayments(); renderContacts(); renderContent();
    document.getElementById('lastSynced').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch(err){
    toast('Could not load data. Check SCRIPT_URL and try again.');
  }
}

document.getElementById('syncBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('syncBtn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="dot"></span> Checking...';
  try{
    const res = await fetch(`${SCRIPT_URL}?action=sync&key=${encodeURIComponent(ACCESS_KEY)}`);
    const json = await res.json();
    const foundCount = (json && typeof json.newCount === 'number') ? json.newCount : 0;
    await loadData();
    toast(foundCount > 0 ? `✓ Found ${foundCount} new payment${foundCount===1?'':'s'}` : '✓ You are all caught up');
  } catch(err){
    toast('Sync failed — check your connection and try again.');
  } finally{
    btn.classList.remove('loading');
    btn.innerHTML = '<span class="dot"></span> Check for New Payments';
  }
});

function toast(msg){
  const t = document.getElementById('syncToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 3200);
}

/* ---------------- STATS ---------------- */
function renderStats(){
  const total = DATA.registrations.length;
  const paid = DATA.registrations.filter(r => (r.PaymentStatus||'').toLowerCase() === 'paid').length;
  const awaiting = total - paid;
  const revenue = DATA.registrations
    .filter(r => (r.PaymentStatus||'').toLowerCase() === 'paid')
    .reduce((sum, r) => sum + (parseFloat(r.Price) || 0), 0);

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPaid').textContent = paid;
  document.getElementById('statAwaiting').textContent = awaiting;
  document.getElementById('statRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');
}

/* ---------------- BOOKINGS TAB ---------------- */
let bookingsFilterState = 'all';
function renderBookings(){
  const list = document.getElementById('bookingsList');
  const q = (document.getElementById('bookingsSearch').value || '').toLowerCase();

  let rows = DATA.registrations.filter(r=>{
    const paid = (r.PaymentStatus||'').toLowerCase() === 'paid';
    if(bookingsFilterState === 'paid' && !paid) return false;
    if(bookingsFilterState === 'awaiting' && paid) return false;
    const hay = `${r.Name||''} ${r.Phone||''} ${r.Program||''} ${r.City||''}`.toLowerCase();
    return hay.includes(q);
  });

  if(rows.length === 0){
    list.innerHTML = emptyState('No bookings yet', 'New registrations will show up here as soon as someone books.');
    return;
  }

  list.innerHTML = rows.map((r, i) => {
    const paid = (r.PaymentStatus||'').toLowerCase() === 'paid';
    return `
    <div class="item-card">
      <div class="item-main">
        <h3>${esc(r.Name)}</h3>
        <div class="item-meta">
          <b>${esc(r.Program||'—')}</b> · ${esc(r.City||'—')}<br>
          ${esc(r.Phone||'—')} · ${esc(r.Email||'—')}
        </div>
      </div>
      <div class="item-side">
        <div class="price-tag">₹${esc(r.Price||'0')}</div>
        <span class="status-tag ${paid?'paid':'awaiting'}">${paid?'Paid':'Awaiting Payment'}</span>
        <button class="mini-btn" onclick="toggleBookingStatus('${esc(r.Timestamp)}','${esc(r.Phone)}')">Mark as ${paid?'Awaiting':'Paid'}</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleBookingStatus(timestamp, phone){
  try{
    await fetch(`${SCRIPT_URL}?action=updateStatus&key=${encodeURIComponent(ACCESS_KEY)}&timestamp=${encodeURIComponent(timestamp)}&phone=${encodeURIComponent(phone)}`);
    toast('Updated');
    loadData();
  } catch(err){
    toast('Could not update — try again.');
  }
}

document.getElementById('bookingsSearch').addEventListener('input', renderBookings);
document.getElementById('bookingsFilter').addEventListener('click', e=>{
  if(e.target.classList.contains('pill')){
    document.querySelectorAll('#bookingsFilter .pill').forEach(p=>p.classList.remove('active'));
    e.target.classList.add('active');
    bookingsFilterState = e.target.dataset.filter;
    renderBookings();
  }
});

/* ---------------- PAYMENTS TAB ---------------- */
function renderPayments(){
  const list = document.getElementById('paymentsList');
  const q = (document.getElementById('paymentsSearch').value || '').toLowerCase();
  let rows = DATA.payments.filter(p=>{
    const hay = `${p.Email||''} ${p.Contact||''} ${p.PaymentId||''}`.toLowerCase();
    return hay.includes(q);
  });

  if(rows.length === 0){
    list.innerHTML = emptyState('No payments yet', 'Synced Razorpay payments will appear here.');
    return;
  }

  list.innerHTML = rows.map(p=>{
    const captured = (p.Status||'').toLowerCase() === 'captured';
    return `
    <div class="item-card">
      <div class="item-main">
        <h3>${esc(p.PaymentId)}</h3>
        <div class="item-meta">
          ${esc(p.Email||'—')} · ${esc(p.Contact||'—')}<br>
          ${esc(p.Method||'—')} · ${esc(p.Date||'—')}
        </div>
      </div>
      <div class="item-side">
        <div class="price-tag">₹${esc(p.Amount||'0')}</div>
        <span class="status-tag ${captured?'paid':'awaiting'}">${esc(p.Status||'—')}</span>
      </div>
    </div>`;
  }).join('');
}
document.getElementById('paymentsSearch').addEventListener('input', renderPayments);

/* ---------------- CONTACTS TAB (CRM) ---------------- */
function renderContacts(){
  const list = document.getElementById('contactsList');
  const q = (document.getElementById('contactsSearch').value || '').toLowerCase();
  let rows = DATA.crm.filter(c=>{
    const hay = `${c.Name||''} ${c.Phone||''} ${c.Email||''} ${c.Tags||''}`.toLowerCase();
    return hay.includes(q);
  });

  if(rows.length === 0){
    list.innerHTML = emptyState('No contacts yet', 'Contacts you add or that come in from registrations will show up here.');
    return;
  }

  list.innerHTML = rows.map(c=>`
    <div class="item-card">
      <div class="item-main">
        <h3>${esc(c.Name)}</h3>
        <div class="item-meta">
          ${esc(c.Phone||'—')} · ${esc(c.Email||'—')}<br>
          ${esc(c.Notes||'')}
        </div>
      </div>
      <div class="item-side">
        <span class="status-tag paid">${esc(c.Status||'—')}</span>
      </div>
    </div>`).join('');
}
document.getElementById('contactsSearch').addEventListener('input', renderContacts);

/* ---------------- CONTENT IDEAS TAB (InstaPlanner) ---------------- */
function renderContent(){
  const list = document.getElementById('contentList');
  const q = (document.getElementById('contentSearch').value || '').toLowerCase();
  let rows = DATA.planner.filter(p=>{
    const hay = `${p.Idea||''} ${p.Caption||''}`.toLowerCase();
    return hay.includes(q);
  });

  if(rows.length === 0){
    list.innerHTML = emptyState('No content ideas yet', 'Add rows to the InstaPlanner sheet and they will show up here.');
    return;
  }

  list.innerHTML = rows.map(p=>`
    <div class="item-card">
      <div class="item-main">
        <h3>${esc(p.Idea)}</h3>
        <div class="item-meta">${esc(p.Caption||'')}</div>
      </div>
      <div class="item-side">
        <span class="status-tag ${(p.Status||'').toLowerCase()==='posted'?'paid':'awaiting'}">${esc(p.Status||'Idea')}</span>
      </div>
    </div>`).join('');
}
document.getElementById('contentSearch').addEventListener('input', renderContent);

/* ---------------- TABS ---------------- */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ---------------- HELPERS ---------------- */
function esc(v){
  if(v === undefined || v === null) return '';
  return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function emptyState(title, body){
  return `<div class="empty-state"><h3>${title}</h3><p>${body}</p></div>`;
}

/* ---------------- AUTO LOGIN ---------------- */
if(ACCESS_KEY){ showApp(); } else { loginScreen.style.display = 'flex'; }
</script>
